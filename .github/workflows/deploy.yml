# Deploy the Astro site to GitHub Pages.
#
# Setup checklist (one-time, done in GitHub UI):
#   1. Push this repo to GitHub.
#   2. In the repo: Settings → Pages → "Build and deployment" →
#      Source: "GitHub Actions". (Do NOT pick "Deploy from a branch".)
#   3. The first push to main will trigger this workflow and publish.
#
# Per Working Agreements §3: TypeScript everywhere, no side effects outside
# the assigned root. This workflow only reads the repo and writes to the
# GitHub Pages artifact — no external network mutations.
#
# Decision: ADR-018 — primary host switched from Cloudflare Pages to
# GitHub Pages (was the documented fallback in ADR-002).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual re-run from the Actions tab.
  workflow_dispatch:

# GITHUB_TOKEN permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-flight runs when a new push arrives — only the latest commit
# should ever be live.
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # PUBLIC_BASE_URL is consumed by astro.config.mjs to set the `base`
        # field automatically when deployed under a project-pages URL
        # (https://<user>.github.io/<repo>/). For a user-site or custom
        # domain, leave PUBLIC_BASE_URL unset and the config picks "/".
        run: npm run build
        env:
          PUBLIC_BASE_URL: /${{ github.event.repository.name }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
